<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenPlaato Setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      font-size: 3rem;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #1a1a1a;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.4rem;
    }

    .field {
      margin-bottom: 1.1rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #2d6a4f;
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 3rem;
    }

    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: #888;
      padding: 0.25rem;
    }

    .btn {
      width: 100%;
      padding: 0.85rem;
      background: #2d6a4f;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    .btn:hover { background: #245c43; }
    .btn:active { background: #1d4d38; }
    .btn:disabled { background: #7ab299; cursor: not-allowed; }

    .status {
      display: none;
      margin-top: 1.5rem;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 2rem;
      height: 2rem;
      border: 3px solid #d4eadf;
      border-top-color: #2d6a4f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status p {
      color: #444;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .status .hint {
      margin-top: 0.5rem;
      color: #2d6a4f;
      font-weight: 600;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🍺</div>
    <h1>OpenPlaato Setup</h1>
    <p class="subtitle">Connect your Pi to WiFi</p>

    <form id="wifiForm">
      <div class="field">
        <label for="ssid">WiFi Network</label>
        <input type="text" id="ssid" name="ssid" placeholder="Your network name" autocomplete="off" required />
      </div>

      <div class="field">
        <label for="password">WiFi Password</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" placeholder="Your network password" />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Show/hide password">👁</button>
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Connect to WiFi</button>
    </form>

    <div class="status" id="status">
      <div class="spinner"></div>
      <p>Connecting&hellip; Pi will restart in a moment.</p>
      <p class="hint">Find it at <strong>openplaato.local</strong> or check your router for its IP address.</p>
    </div>
  </div>

  <script>
    document.getElementById('togglePw').addEventListener('click', function () {
      var pw = document.getElementById('password');
      var isHidden = pw.type === 'password';
      pw.type = isHidden ? 'text' : 'password';
      this.textContent = isHidden ? '🙈' : '👁';
    });

    document.getElementById('wifiForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var ssid = document.getElementById('ssid').value.trim();
      var password = document.getElementById('password').value;
      var btn = document.getElementById('submitBtn');

      btn.disabled = true;
      btn.textContent = 'Connecting…';

      var body = new URLSearchParams();
      body.append('ssid', ssid);
      body.append('password', password);

      fetch('/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString()
      })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data.success) {
          document.getElementById('wifiForm').style.display = 'none';
          document.getElementById('status').style.display = 'block';
        }
      })
      .catch(function () {
        // Pi may have already dropped the hotspot — show success anyway
        document.getElementById('wifiForm').style.display = 'none';
        document.getElementById('status').style.display = 'block';
      });
    });
  </script>
</body>
</html>
